<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desvende o Número Secreto</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="app">
        <section class="card">
            <header class="hero">
                <p>Desvende o número secreto</p>
                <p>Você tem 5 tentativas para acertar entre 1 e 100</p>
            </header>
            <section class="form-grid">
                <div class="field">
                    <label for="numero_usuario">Seu palpite</label>
                    <input type="number" id="numero_usuario" placeholder="Digite um número de 1 a 100" min="1" max="100" step="1">
                </div>
                <button id="button" onclick="chutar()">Arriscar</button>
            </section>
            <section class="results">
                <p class="result-box" id="resultado"></p>
                <p class="tentativas-box" id="tentativas"></p>
            </section>
        </section>
    </main>
</body>
</html>
